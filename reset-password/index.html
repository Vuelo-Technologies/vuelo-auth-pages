<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password | CommitLedger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.card{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:15px;
  width:350px;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  margin-top:15px;
  padding:10px;
  width:100%;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Set New Password</h2>
<input type="password" id="password" placeholder="New Password"/>
<button onclick="updatePassword()">Update Password</button>
<p id="msg"></p>
</div>

<script>
window.addEventListener("load", function() {

  const client = window.supabase.createClient(
    "https://mlghlxzjezzcxntbbkcc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sZ2hseHpqZXp6Y3hudGJia2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTQzMjAsImV4cCI6MjA4NjkzMDMyMH0.V1crNIHU7j-nnEdkQ22lajampUk0nnwXtnhbFafJlRk"
  );

  async function initSession() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");
    const type = params.get("type");

    if (type === "recovery" && access_token && refresh_token) {
      await client.auth.setSession({
        access_token,
        refresh_token
      });
    }
  }

  window.updatePassword = async function () {
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    const { error } = await client.auth.updateUser({
      password: password
    });

    if (error) {
      msg.innerText = error.message;
    } else {
      msg.innerText = "Password updated successfully. You may close this page.";
    }
  };

  initSession();
});
</script>

</body>
</html>
