<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password | CommitLedger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f3d2e, #14532d);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: #ffffff;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  padding: 50px 40px;
  border-radius: 20px;
  width: 400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  text-align: center;
}

.logo {
  font-size: 14px;
  letter-spacing: 2px;
  color: #4ade80;
  margin-bottom: 10px;
}

h2 {
  margin: 10px 0 30px 0;
  font-size: 26px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
}

#msg {
  margin-top: 20px;
  font-size: 14px;
  color: #bbf7d0;
}

.footer {
  margin-top: 25px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">COMMITLEDGER</div>
  <h2>Set New Password</h2>

  <input type="password" id="password" placeholder="Enter new password" />
  <button onclick="updatePassword()">Update Password</button>

  <p id="msg"></p>

  <div class="footer">
    Secure authentication powered by Vuelo Technologies
  </div>
</div>

<script>
window.addEventListener("load", function() {

  const client = window.supabase.createClient(
    "https://mlghlxzjezzcxntbbkcc.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sZ2hseHpqZXp6Y3hudGJia2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTQzMjAsImV4cCI6MjA4NjkzMDMyMH0.V1crNIHU7j-nnEdkQ22lajampUk0nnwXtnhbFafJlRk"
  );

  async function initSession() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");
    const type = params.get("type");

    if (type === "recovery" && access_token && refresh_token) {
      await client.auth.setSession({
        access_token,
        refresh_token
      });
    }
  }

  window.updatePassword = async function () {
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    const { error } = await client.auth.updateUser({
      password: password
    });

    if (error) {
      msg.style.color = "#fca5a5";
      msg.innerText = error.message;
    } else {
      msg.style.color = "#86efac";
      msg.innerText = "Password updated successfully. You may close this page.";
    }
  };

  initSession();
});
</script>

</body>
</html>
